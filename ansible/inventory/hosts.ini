# Fill in EC2 IPs after creating your servers
[jenkins]
jenkins-server ansible_host=JENKINS_EC2_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/your-key.pem

[admin]
admin-machine  ansible_host=ADMIN_EC2_IP  ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/your-key.pem

[all:vars]
ansible_python_interpreter=/usr/bin/python3
